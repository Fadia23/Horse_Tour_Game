<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title> Horse Racing Game </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>لعبة جولة الحصان</h1>
        <p>هدف اللعبة: زيارة كل المربعات (64) مرة واحدة فقط!</p>
        <div id="board" class="board"></div>
        <div class="stats">
            <span>المربعات المزارة: <b id="score">0</b> / 64</span>
            <button onclick="resetGame()">إعادة اللعب</button>
        </div>
        <p id="message"></p>
    </div>
    <script src="main.js"></script>
</body>
</html>
