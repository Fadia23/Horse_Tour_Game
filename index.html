<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horse Tour Game</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1>🐎 Horse Tour</h1>

      <div class="stats-panel">
        <span>Step: <b id="score">0</b>/64</span>
        <span>Time: <b id="timer">00:00</b></span>
      </div>

      <div id="board" class="board"></div>

      <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Reset</button>
        <button class="btn-undo" id="undoBtn" onclick="undoMove()">
          Undo ↩️
        </button>
        <button class="btn-solve" id="solveBtn" onclick="runBacktracking()">
          Run Backtracking 🤖
        </button>
      </div>

      <p id="message"></p>
    </div>

    <script src="main.js"></script>
  </body>
</html>
